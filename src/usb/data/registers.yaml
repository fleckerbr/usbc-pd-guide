"CC_STATUS":
  address: 0x1D
  bytes: 1
  details: |
    The TCPM starts the DRP toggling by issuing [COMMAND.Look4Connection].

    The TCPM reads this register upon detecting an [Alert#] and seeing the [ALERT.CCStatus]=`1b`.
    The TCPC indicates the Connection status, the Connection result, and the current CC state in this register.

    The TCPC shall set [CC_STATUS.Looking4Connection]=`0b` when it has detected a potential connection.
    The Autonomous DRP toggling details are defined in Figure 4-24 and Section 4.4.8.

    The TCPM reads the [Looking4Connection]([CC_STATUS.Looking4Connection]) to determine if the TCPC is toggling Rp/Rd when operating as a DRP.
    The TCPM reads the [CC_STATUS.ConnectResult] to determine if a DRP TCPC is presenting an Rp or Rd.
    The TCPM shall read the [CC_STATUS.CC1State] and [CC_STATUS.CC2State] to determine the CC1 and CC2 states.

    When reporting the state of the CC lines, the TCPC shall debounce for tTCPCfilter.
    The TCPC shall perform a minimal debounce and the TCPM must complete the debounce as defined in [USB TC].

    The TCPM as a Source detects a Sink attachment and detachment by reading [CC_STATUS.CC1State] and [CC_STATUS.CC2State] bits.
    The CC Status monitoring may be disabled per Section 4.8.3.

    A TCPM which is using polling rather than Alerts should assume the data in the [CC_STATUS] register is not valid until at least
    tCCStatusDelay + tTCPCFilter + tCcTCPCSampleRate (max) after the [ROLE_CONTROL] has been updated.
    The tCcTCPCSampleRate is the CC sample rate used by the TCPC.
    The CC sampling method and rate is performed in a vendor specific manner and therefore outside the scope of this specification.
  permissions:
    read: true
    write: false
  reset-value: null
  fields:
    - bit(s): "B7..6"
      reserved: true
    - bit(s): "B5"
      name: "Looking4Connection"
      details:
        - 0b:
            - "TCPC is not actively looking for a connection."
            - "A transition from `1b` to `0b` indicates a potential connection has been found."
        - 1b:
            - "TCPC is looking for a connection."
            - "Toggling as a DRP or looking for a connection as Sink/Source only condition."
    - bit(s): "B4"
      name: "Connect Result"
      details:
        - 0b: "Alert cleared."
        - 1b:
            - "[RECEIVE_BUFFER] register changed."
            - "[READABLE_BYTE_COUNT] being set to `0` does not set this bit."
    - bit(s): "B3..2"
      name: "CC2 State"
      details:
        - - If ([ROLE_CONTROL.CC2]=`Rp`) or ([CC_STATUS.ConnectResult]=`0b`)
          - 00b: SRC.Open (Open, Rp)
            01b: SRC.Ra (below maximum vRa)
            10b: SRC.Rd (within the vRd range)
            11b: Reserved
        - - If ([ROLE_CONTROL.CC2]=`Rd`) or ([CC_STATUS.ConnectResult]=`1b`)
          - 00b: SNK.Open (below maximum vRa)
            01b: SNK.Default (above minimum vRd-Connect)
            10b: SNK.Power1.5 (above minimum vRd-Connect), detects Rp 1.5A
            11b: SNK.Power3.0 (above minimum vRd-Connect), detects Rp 3.0A
        - - If [ROLE_CONTROL.CC2]=`Ra`, this field is set to `00b`
          - If [ROLE_CONTROL.CC2]=`Open`, this field is set to `00b`
          - |
            This field always returns `00b` if ([CC_STATUS.Looking4Connection]=`1b`) or
            ([POWER_CONTROL.EnableVconn]=`1b` and [TCPC_CONTROL.PlugOrientation]=`1b`).
            Otherwise, the returned value depends upon [ROLE_CONTROL.CC2].
    - bit(s): "B1..0"
      name: "CC1 State"
      details:
        - - If ([ROLE_CONTROL.CC1]=`Rp`) or ([CC_STATUS.ConnectResult]=`0b`)
          - 00b: SRC.Open (Open, Rp)
            01b: SRC.Ra (below maximum vRa)
            10b: SRC.Rd (within the vRd range)
            11b: Reserved
        - - If ([ROLE_CONTROL.CC1]=`Rd`) or ([CC_STATUS.ConnectResult]=`1b`)
          - 00b: SNK.Open (below maximum vRa)
            01b: SNK.Default (above minimum vRd-Connect)
            10b: SNK.Power1.5 (above minimum vRd-Connect), detects Rp 1.5A
            11b: SNK.Power3.0 (above minimum vRd-Connect), detects Rp 3.0A
        - - If [ROLE_CONTROL.CC1]=`Ra`, this field is set to `00b`
          - If [ROLE_CONTROL.CC1]=`Open`, this field is set to `00b`
          - |
            This field always returns `00b` if ([CC_STATUS.Looking4Connection]=`1b`) or
            ([POWER_CONTROL.EnableVconn]=`1b` and [TCPC_CONTROL.PlugOrientation]=`1b`).
            Otherwise, the returned value depends upon [ROLE_CONTROL.CC1].

"POWER_STATUS":
  address: 0x1E
  bytes: 1
  details: |
    This register is set and cleared by the TCPC.
    The TCPM reads this register upon detecting an [Alert#] and reading the [ALERT.PowerStatus] bit set to `1b`.
    The TCPC indicates the current Power Status in this register.

    The TCPM operating as a Sink at vSafe5V (with or without a USB PD Contract) shall detect VBus presence and removal by reading the [VBusPresent]([POWER_STATUS.VBusPresent]) bit.

    The TCPM shall check the state of the TCPC Initialization Status bit when it starts or resets.
    The TCPM shall not start normal operation until the TCPC Initialization Status bit is cleared.
    The TCPC shall set the TCPC Initialization Status bit to zero when initialization or reset is complete and all registers are valid.
  permissions:
    read: true
    write: false
  reset-value: null
  fields:
    - bit(s): "B7"
      name: "Debug Accessory Connected"
      required: false
      details:
        - - 0b: No Debug Accessory connected (default).
          - 1b: Debug Accessory connected.
        - Reflects the state of the [DebugConnectedAccessory#] output if supported.
    - bit(s): "B6"
      name: "TCPC Initialization Status"
      details:
        - 0b: The TCPC has completed initialization and all registers are valid.
        - 1b:
            - The TCPC is still performing internal initialization.
            - The only registers that are guaranteed to return the correct values are `0x00`..`0x0F`.
    - bit(s): "B5"
      name: "Sourcing Nondefault Voltage"
      required: false
      details:
        - - 0b: vSafe5V.
          - 1b: Nondefault VBus voltage.
        - |
          This bit does not control the power path, it just provides a monitor of the status.
          This bit is asserted as long as the TCPC is sourcing nondefault voltage over VBus (i.e. not vSafe5V)
          as a response to TCPM writing to [COMMAND.SourceVBusNondefaultVoltage].

          Required if nondefault VBus voltage can be sourced.

          This bit is not valid if [POWER_STATUS.SourcingVBus]=`0b`.
    - bit(s): "B4"
      name: "Sourcing VBus"
      details:
        - - 0b: Sourcing VBus is disabled.
          - 1b: Sourcing VBus is enabled.
        - This bit does not control the power path, it just provides a monitor of the status.
    - bit(s): "B3"
      name: "VBus Detection Enabled"
      details:
        - - 0b: VBus detection disabled.
          - 1b: VBus detection enabled (default).
        - Indicates whether the TCPC is monitoring for [POWER_STATUS.VBusPresent] and vSafe0V level, or the detection circuits have been powered off.
    - bit(s): "B2"
      name: "VBus Present"
      details:
        - - 0b: VBus disconnected.
          - 1b: VBus connected.
        - |
          The TCPC shall report VBus present when TCPC detects VBus rises above 4V.
          The TCPC shall report VBus is not present when TCPC detects VBus falls below 3.5V.
          The TCPC may report VBus is not present if VBus is between 3.5V and 4V.

          This bit is not valid when [POWER_STATUS.VbusDetectionEnabled]=`0b`.
    - bit(s): "B1"
      name: "VConn Present"
      details:
        - - 0b: VConn is not present.
          - 1b:
              - This bit is asserted when VConn present on CC1 or CC2.
              - Threshold is fixed at 2.4V
        - If [POWER_CONTROL.EnableVConn] is disabled this bit should be set to `0b`.
    - bit(s): "B0"
      name: "Sinking VBus"
      details:
        - 0b: Sink is disconnected (default and if sinking VBus is not supported).
        - 1b: TCPC is sinking VBus to the system load.

