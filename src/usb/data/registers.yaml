"VENDOR_ID":
  address: 0x00
  bytes: 2
  details: |
    A Vendor ID, or [VID]([VENDOR_ID.VID]), is used to identify the TCPC vendor.
    The [VID]([VENDOR_ID.VID]) is a unique 16-bit unsigned integer assigned by USB-IF.
  permissions:
    read: true
    write: false
  reset-value: "Vendor Defined"
  fields:
    - bit(s): "B15..0"
      name: "Vendor ID"
      identifier: "VID"
      details: "A unique 16-bit unsigned integer assigned by the USB-IF to the Vendor."

"PRODUCT_ID":
  address: 0x02
  bytes: 2
  details: |
    The Product ID, or [PID]([PRODUCT_ID.PID]), is used to identify the TCPC product.
    Manufacturers should set the USB Product ID field to a unique value across all USB products from the vendor.
  permissions:
    read: true
    write: false
  reset-value: "Vendor Defined"
  fields:
    - bit(s): "B15..0"
      name: "Product ID"
      identifier: "PID"
      details: "A unique 16-bit unsigned integer assigned uniquely by the Vendor to identify the TCPC."

"DEVICE_ID":
  address: 0x04
  bytes: 2
  details: |
    The Device ID, [bcdDevice]([DEVICE_ID.bcdDevice]), is used to identify the release version of the product.
    The [bcdDevice]([DEVICE_ID.bcdDevice]) field should reflect a version number relevant to the release version of the product.
  permissions:
    read: true
    write: false
  reset-value: "Vendor Defined"
  fields:
    - bit(s): "B15..0"
      name: "bcd Device"
      details: "A unique 16-bit unsigned integer assigned by the Vendor to identify the version of the TCPC."

"USBTYPEC_REV":
  address: 0x06
  bytes: 2
  details: |
    This register refers to [USB TC] Cable and Connector Specification Revision, USB Type-C represented by a unique 16-bit unsigned register.
    The format is packed binary coded decimal.
  permissions:
    read: true
    write: false
  reset-value: "Vendor Defined"
  fields:
    - bit(s): "B15..8"
      reserved: true
    - bit(s): "B7..0"
      name: "bcd USB Type-C Release"
      identifier: "bcdUSBTypeCRelease"
      details: "Example: `0010 0001` - Release 2.1"

"USBPD_REV_VER":
  address: 0x08
  bytes: 2
  details: |
    This register refers to USB PD Specification Revision and Version, USB PD represented by a unique 16-bit unsigned integer.
    The format is packed binary coded decimal.
  permissions:
    read: true
    write: false
  reset-value: "Vendor Defined"
  fields:
    - bit(s): "B15..8"
      name: "bcd USB PD Revision"
      details: "Example: `0011 0001` - Revision 3.1"
    - bit(s): "B7..0"
      name: "bcd USB PD Version"
      details: "Example: `0001 0000` - Version 1.0"

"PD_INTERFACE_REV":
  address: 0x0A
  bytes: 2
  details: |
    The USB-Port Controller Specification Revision register refers to this Specification Revision and Version represented by a unique 16-bit unsigned integer.
    The format is packed binary coded decimal.
  permissions:
    read: true
    write: false
  reset-value: "Vendor Defined"
  fields:
    - bit(s): "B15..8"
      name: "bcd USB PD Interface Revision"
      details: "Example: `0010 0000` - Revision 2.0"
    - bit(s): "B7..0"
      name: "bcd USB PD Interface Version"
      details: "Example: `0001 0011` - Version 1.3"

"ALERT":
  address: 0x10
  bytes: 2
  details: |
    This register is set by TCPC and cleared by TCPM.

    This register is used to communicate a status change from the TCPC to the TCPM.
    After an event or condition occurs, the TCPC shall set the corresponding bit in the [ALERT] register.
    The TCPC shall keep the bit associated with the [ALERT] asserted until the TCPM writes a `1b` to clear it.

    The TCPC indicates an alert status change has occurred by presenting a `1b` in the corresponding
    alert bit position in this register and asserting the [Alert#] pin.
    The TCPM clears the [ALERT] bit by writing a `1b` to the respective [ALERT] bit position.
    The TCPM can clear any number of [ALERT] bits in a single write by setting multiple bits to
    `1b` and the rest of the bits in the register to `0b`.
    The TCPM writing a `0b` to any [ALERT] bit has no effect, and therefore does not cause those [ALERT] bits to be set or cleared.
    The [Alert#] pin remains asserted until all [ALERT] bits are cleared by the TCPM.
    If the TCPM writes a `1b` to a bit that is already `0b`, the TCPC shall not change the value of that bit.

    Writing a `1b` to [ALERT.RxBufferOverflow] does not clear it unless the TCPM also writes a `1b` to [ALERT.RxStatus].
    The [ALERT.RxBufferOverflow] is always asserted if the SOP\* buffer registers are full,
    and those registers can only be cleared by writing a `1b` to [ALERT.RxStatus].
  permissions:
    read: true
    write: true
  reset-value: 0x0000
  fields:
    - bit(s): "B15"
      name: "Vendor Defined Alert"
      details:
        0b: "Alert cleared."
        1b: |
          A vendor defined alert has been detected.

          Defined in the [VENDOR_DEFINED] registers. Refer to the vendor datasheet for details.
          This bit can be cleared, regardless of the current status of the alert source.
    - bit(s): "B14"
      name: "Alert Extended"
      details:
        0b: "Alert cleared."
        1b: |
          An extended interrupt event has occurred.

          Read the [ALERT_EXTENDED] register.
    - bit(s): "B13"
      name: "Extended Status"
      details:
        0b: "Alert cleared."
        1b: "Extended Status changed."
    - bit(s): "B12"
      name: "Beginning SOP* Message Status"
      identifier: "RxBeginningStatus"
      details:
        0b: "Alert cleared."
        1b: |
          The [RECEIVE_BUFFER] register changed.

          Setting [READABLE_BYTE_COUNT] to 0 does not set this bit.
          Set if [READABLE_BYTE_COUNT] is greater than 133 to indicate an extended USB PD message with
          more than 128 data bytes has been received. Not set if [READABLE_BYTE_COUNT] is 133 or less.
    - bit(s): "B11"
      name: "VBus Sink Disconnect Detected"
      details:
        0b: "Alert cleared."
        1b: |
          The TCPC in [Attached.SNK] state has detected a Sink disconnect.

          This bit shall only be asserted when [POWER_CONTROL.AutoDischargeDisconnect] is set.
          The Sink TCPC asserts this bit either when [POWER_STATUS.VbusPresent] transitions from `1b` to `0b`
          (if [DEVICE_CAPABILITIES_2.SinkDisconnectDetection]=`0b`) or the TCPC detects VBUS falling below
          [VBUS_SINK_DISCONNECT_THRESHOLD] (if [DEVICE_CAPABILITIES_2.SinkDisconnectDetection]=`1b`).
    - bit(s): "B10"
      name: "Receive Buffer Overflow"
      identifier: "RxBufferOverflow"
      details:
        0b: "TCPC Rx buffer is functioning properly."
        1b: |
          TCPC Rx buffer has overflowed.

          Future GoodCRC shall not be sent.
          Writing 1 to this register acknowledges the overflow.
          The overflow is cleared by writing to [ALERT.RxStatus].
    - bit(s): "B9"
      name: "Fault"
      details:
        0b: "No fault."
        1b: |
          A fault has occurred.

          Read the [FAULT_STATUS] register.
    - bit(s): "B8"
      name: "VBus Voltage Alarm Low"
      identifier: "VBusVoltageAlarmLo"
      details:
        0b: "Alert cleared."
        1b: "A low-voltage alarm has occurred."
    - bit(s): "B7"
      name: "VBus Voltage Alarm High"
      identifier: "VBusVoltageAlarmHi"
      details:
        0b: "Alert cleared."
        1b: "A high-voltage alarm has occurred."
    - bit(s): "B6"
      name: "Transmit SOP* Message Successful"
      identifier: "TxMessageSuccessful"
      details:
        0b: "Alert cleared."
        1b: |
          Reset or SOP\* message transmission successful.

          GoodCRC response received on SOP\* message transmission.
          Transmit SOP\* message buffer registers are empty.
    - bit(s): "B5"
      name: "Transmit SOP* Message Discarded"
      identifier: "TxMessageDiscarded"
      details:
        0b: "Alert cleared."
        1b: |
          Reset or SOP\* message transmission not sent due to an incoming receive message.

          Transmit SOP\* message buffer registers are empty.
    - bit(s): "B4"
      name: "Transmit SOP* Message Failed"
      identifier: "TxMessageFailed"
      details:
        0b: "Alert cleared."
        1b: |
          SOP\* message transmission not successful.

          No GoodCRC response received on SOP\* message transmission.
          Transmit SOP\* message buffer registers are empty.
    - bit(s): "B3"
      name: "Received Hard Reset"
      identifier: "HardReset"
      details:
        0b: "Alert cleared."
        1b: "Received Hard Reset message."
    - bit(s): "B2"
      name: "Received SOP* Message Status"
      identifier: "RxStatus"
      details:
        0b: "Alert cleared."
        1b: |
          [RECEIVE_BUFFER] register changed.

          [READABLE_BYTE_COUNT] being set to 0 does not set this bit.
    - bit(s): "B1"
      name: "Power Status"
      details:
        0b: "Alert cleared."
        1b: |
          Power Status changed.

          Read the [POWER_STATUS] register.
    - bit(s): "B0"
      name: "CC Status"
      details:
        0b: "Alert cleared."
        1b: |
          CC Status changed.

          TCPC shall not assert this bit when [CC_STATUS.Looking4Connection] changes state
          if [TCPC_CONTROL.EnableLooking4ConnectionAlert] is set to `0b`.

